<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greeting SDK Test</title>
</head>
<body>
    <h1>Greeting SDK Demo</h1>
    <input type="text" id="nameInput" placeholder="Enter your name">
    <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
    </select>
    <button onclick="greetUser()">Greet</button>
    <div id="output"></div>

    <script src="https://khatri-sanjay.github.io/web-sdk-demo/greeting-sdk.js"></script>
    <script>
        const greetingSdk = new Greeting();

        function greetUser() {
            const nameInput = document.getElementById('nameInput');
            const languageSelect = document.getElementById('languageSelect');
            const outputDiv = document.getElementById('output');
            
            if (nameInput.value) {
                // Use the greetInLanguage method
                const greeting = greetingSdk.greetInLanguage(
                    nameInput.value, 
                    languageSelect.value
                );
                
                outputDiv.textContent = greeting;
            } else {
                outputDiv.textContent = 'Please enter a name';
            }
        }
    </script>
</body>
</html>
