<!DOCTYPE html>
<html>
<head>
    <title>Greeting SDK Example (ES Module)</title>
</head>
<body>
    <h1>Greeting SDK Example</h1>
    <input type="text" id="nameInput" placeholder="Enter name">
    <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
    </select>
    <button id="greetButton">Greet</button>
    <p id="greetingOutput"></p>

    <script type="module">
        import { Greeting } from 'https://khatri-sanjay.github.io/web-sdk-demo/greeting2.js'; // Adjust path if needed

        const greeter = new Greeting();

        document.getElementById('greetButton').addEventListener('click', function() {
            const name = document.getElementById('nameInput').value;
            const language = document.getElementById('languageSelect').value;

            const greeting = greeter.greetInLanguage(name, language);
            document.getElementById('greetingOutput').textContent = greeting;
        });
    </script>
</body>
</html>
